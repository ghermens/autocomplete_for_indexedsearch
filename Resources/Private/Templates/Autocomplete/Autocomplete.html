<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:layout name="Default" />
<f:section name="main">
	<f:spaceless>
		<ul role="listbox" id="{listboxid}" aria-label="{f:translate(key: 'form.searchFor', domain: 'indexed_search.messages', extensionName: 'indexedSearch')}">
			<f:for each="{suggestions}" as="suggestion">
				<li role="option">{suggestion}</li>
			</f:for>
		</ul>
	</f:spaceless>
</f:section>
</html>
